<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Fatima Youth Federation</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="login-body">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    
    <div class="login-container">
      <div class="cross-icon-container">
        <svg class="cross-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- Cross Base -->
          <rect x="42" y="10" width="16" height="80" rx="8" fill="url(#cross-grad)" filter="url(#glow)"/>
          <rect x="20" y="35" width="60" height="16" rx="8" fill="url(#cross-grad)" filter="url(#glow)"/>
          
          <defs>
            <linearGradient id="cross-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#9d4edd" />
              <stop offset="100%" stop-color="#3c096c" />
            </linearGradient>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
        </svg>
      </div>
      
      <h1 class="brand-title">Fatima Youth</h1>
      <p class="brand-subtitle">Federation of Yayamulla</p>
      
      <div class="auth-tabs">
        <button class="tab-btn active" id="tab-login">Sign In</button>
        <button class="tab-btn" id="tab-register">Sign Up</button>
      </div>

      <form id="auth-form" class="auth-form">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required />
        </div>
        
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">Enter Portal</button>
      </form>
    </div>
    
    <script type="module" src="./main.js"></script>
  </body>
</html>
